<!DOCTYPE html>
<html lang="en">
  <body>
    <form
      name="start-project"
      method="POST"
      data-netlify="true"
      netlify-honeypot="bot-field"
      hidden
    >
      <input type="hidden" name="form-name" value="start-project" />
      <input type="hidden" name="bot-field" />
      <input type="text" name="name" />
      <input type="text" name="business" />
      <input type="email" name="email" />
      <input type="text" name="phone" />
      <select name="service">
        <option>Drone shooting / aerial filming</option>
        <option>Video editing</option>
        <option>Web design / website build</option>
        <option>Social media content creation</option>
        <option>Not sure yet / need advice</option>
      </select>
      <textarea name="message"></textarea>
      <select name="contactMethod">
        <option>Email</option>
        <option>Phone</option>
        <option>WhatsApp</option>
      </select>
    </form>
  </body>
</html>
